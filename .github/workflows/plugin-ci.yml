name: Plugin CI

on:
  push:
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/plugin-ci.yml"
  pull_request:
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/plugin-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-qwen-oauth
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: opencode-qwen-oauth/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
