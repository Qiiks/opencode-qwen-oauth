name: Plugin CI

on:
  push:
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/plugin-ci.yml"
  pull_request:
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/plugin-ci.yml"

jobs:
  plugin:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: opencode-qwen-oauth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: opencode-qwen-oauth/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  bun-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-qwen-oauth
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install
      - run: bunx tsc -p tsconfig.json --noEmit
