name: Release

on:
  push:
    branches:
      - main
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/release.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Release to NPM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-qwen-oauth
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check version changed
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_EXISTS=$(git tag -l "v$VERSION")
          if [ -z "$TAG_EXISTS" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION already published (tag v$VERSION exists)"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.version-check.outputs.publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.version-check.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.version-check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.version-check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version-check.outputs.version }}
          name: v${{ steps.version-check.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            npm install opencode-qwen-auth-plugin
            # or
            bun add opencode-qwen-auth-plugin
            # or
            pnpm add opencode-qwen-auth-plugin
            ```

            ## Setup

            Add to your `~/.config/opencode/opencode.json`:

            ```json
            {
              "plugin": ["opencode-qwen-auth-plugin@latest"]
            }
            ```

            Then run `opencode auth login` and select the Qwen OAuth option.
