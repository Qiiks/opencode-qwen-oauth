name: Release

on:
  push:
    branches:
      - main
    paths:
      - "opencode-qwen-oauth/**"
      - ".github/workflows/release.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Release to NPM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-qwen-oauth
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        id: publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm publish --access public
          cwd: opencode-qwen-oauth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ fromJson(steps.publish.outputs.publishedPackages)[0].version }}
          name: v${{ fromJson(steps.publish.outputs.publishedPackages)[0].version }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            npm install opencode-qwen-auth-plugin
            # or
            bun add opencode-qwen-auth-plugin
            # or
            pnpm add opencode-qwen-auth-plugin
            ```

            ## Setup

            Add to your `~/.config/opencode/opencode.json`:

            ```json
            {
              "plugin": ["opencode-qwen-auth-plugin@latest"]
            }
            ```

            Then run `opencode auth login` and select the Qwen OAuth option.
